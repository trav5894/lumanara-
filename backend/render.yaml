services:
  - type: web
    name: lumanara-backend
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    context: .
    envVars:
      - key: SECRET_KEY
        scope: run
        value: your-secret-key-change-in-production
      - key: DEBUG
        scope: run
        value: "False"
      - key: CORS_ORIGINS
        scope: run
        value: https://trav5894.github.io/lumanara-

# Note: This service uses the repository Dockerfile. The previous Python service
# definition (with a Postgres service) was removed because the current backend
# uses a lightweight file-backed Node implementation. If you want a managed DB,
# re-add a Postgres service and update the backend to use it.
