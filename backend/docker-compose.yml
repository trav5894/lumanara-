version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lumanara_db
    environment:
      POSTGRES_USER: lumanara_user
      POSTGRES_PASSWORD: lumanara_password
      POSTGRES_DB: lumanara_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumanara_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: lumanara_backend
    environment:
      DATABASE_URL: postgresql://lumanara_user:lumanara_password@db:5432/lumanara_db
      SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "True"
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
